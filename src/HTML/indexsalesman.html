<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CreaFit - Dashboard Gerente</title>
    <link rel="stylesheet" href="../CSS/indexmanager.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="brand">
                <div class="">
                    <img class="logo" src="../../images/CF.png">
                </div>
                <div>
                    <h2>CREAFIT</h2>
                    <p>Sistema de Gestión</p>
                </div>
            </div>

            <div class="user-profile">
                <div class="user-info">
                    <p><b id="nombre-trabajador">Cargando...</b></p>
                    <p><span id="puesto-trabajador"></span></p>
                </div>
            </div>

            <nav class="menu">
                <a href="#" class="menu-item active">
                    <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-house w-5 h-5" data-fg-dqpt22="1.14:93.308:/src/app/components/Sidebar.tsx:79:17:3096:28:e:Icon" data-fgid-dqpt22=":r1i:"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"></path><path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></span> Inicio
                </a>
                <a href="consultate-product.html" class="menu-item">
                    <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search w-5 h-5 __web-inspector-hide-shortcut__" data-fg-dqpt22="1.14:93.308:/src/app/components/Sidebar.tsx:79:17:3096:28:e:Icon" data-fgid-dqpt22=":r1m:"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg></span> Consultar producto
                </a>
                
            </nav>

            <div class="sidebar-footer">
                <a href="index.html" class="logout-btn" id ="btn-exit">
                    <span class="icon">🚪</span> Cerrar sesión
                </a>
            </div>
        </aside>

        <main class="content">
            <header class="main-header">
                <p><b id="nombre-trabajador">Cargando...</b></p>
                <p>Sistema de gestión de productos y ventas</p>
            </header>

            <section class="stats-grid">
                <div class="stat-card">
                    <div class="card-top">
                        <span class="label">Productos</span>
                        <div class="icon-box blue">📦</div>
                    </div>
                    <div class="card-value">45</div>
                </div>

                <div class="stat-card">
                    <div class="card-top">
                        <span class="label">Ventas del día</span>
                        <div class="icon-box green">🛒</div>
                    </div>
                    <div class="card-value">12</div>
                </div>

                <div class="stat-card">
                    <div class="card-top">
                        <span class="label">Ingresos</span>
                        <div class="icon-box purple">📈</div>
                    </div>
                    <div class="card-value">$8,450</div>
                </div>

                <div class="stat-card">
                    <div class="card-top">
                        <span class="label">Stock bajo</span>
                        <div class="icon-box red">⚠️</div>
                    </div>
                    <div class="card-value">3</div>
                </div>
            </section>
        </main>
    </div>
<script src="../JS/dashboard.js"></script>

</body>
</html>
